version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: pokemon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pokemon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: pokemon_tcg
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokemon -d pokemon_tcg"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/pokecollector-backend:${IMAGE_TAG:-latest}
    build: ./backend
    container_name: pokemon-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://pokemon:${POSTGRES_PASSWORD:-changeme}@postgres:5432/pokemon_tcg
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      TCGDEX_SYNC_LANGUAGES: ${TCGDEX_SYNC_LANGUAGES:-en,de}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backups:/app/backups
    ports:
      - "8000:8000"

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/pokecollector-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        PUBLIC_MODE: ${PUBLIC_MODE:-false}
    container_name: pokemon-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
